<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11131a"/>
      <stop offset="0.55" stop-color="#18131a"/>
      <stop offset="1" stop-color="#22151d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.15" r="0.85">
      <stop offset="0" stop-color="#f47f9c" stop-opacity="0.24"/>
      <stop offset="0.48" stop-color="#ad6fe8" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#11131a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f47f9c"/>
      <stop offset="1" stop-color="#c78cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
    <clipPath id="screen">
      <rect x="630" y="92" width="590" height="456" rx="18"/>
    </clipPath>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <g transform="translate(64 66)">
    <rect width="48" height="48" rx="15" fill="url(#accent)"/>
    <path d="M14 26c0-8 5-14 13-14 5 0 9 2 12 6l-6 4c-2-2-4-3-6-3-4 0-7 3-7 7s3 7 7 7c3 0 5-1 7-4l6 4c-3 5-8 7-13 7-8 0-13-6-13-14Z" fill="#ffffff"/>
  </g>

  <text x="64" y="155" fill="#f6f2f5" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">CODEX DREAM SKIN</text>
  <rect x="64" y="181" width="92" height="5" rx="2.5" fill="url(#accent)"/>

  <text x="64" y="254" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="760">
    <tspan x="64" dy="0">Live wallpapers &amp; themes</tspan>
    <tspan x="64" dy="58">for Codex desktop.</tspan>
  </text>

  <text x="64" y="396" fill="#c8c2ca" font-family="Segoe UI, Arial, sans-serif" font-size="23">
    Keep the native UI. Change the atmosphere.
  </text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1">
    <g transform="translate(64 442)">
      <rect width="126" height="38" rx="19" fill="#f47f9c"/>
      <text x="63" y="25" text-anchor="middle" fill="#211319">WINDOWS EXE</text>
    </g>
    <g transform="translate(202 442)">
      <rect width="90" height="38" rx="19" fill="#272a34" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="45" y="25" text-anchor="middle" fill="#f6f2f5">MACOS</text>
    </g>
    <g transform="translate(304 442)">
      <rect width="112" height="38" rx="19" fill="#272a34" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="56" y="25" text-anchor="middle" fill="#f6f2f5">LOCAL CDP</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="610" y="72" width="630" height="496" rx="26" fill="#242630" stroke="#ffffff" stroke-opacity="0.16"/>
    <rect x="610" y="72" width="630" height="38" rx="26" fill="#30323d"/>
    <circle cx="634" cy="91" r="6" fill="#f47f9c"/>
    <circle cx="654" cy="91" r="6" fill="#f2c56e"/>
    <circle cx="674" cy="91" r="6" fill="#78d8a7"/>
    <image href="screenshot-demo-art.png" x="630" y="92" width="590" height="456" preserveAspectRatio="xMidYMid slice" clip-path="url(#screen)"/>
  </g>

  <text x="64" y="574" fill="#8f8993" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Open source · Reversible · No official app package modification
  </text>
</svg>
